<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live Dashboard - Hybrid Snapshot + API (10 ช่อง) - FullHD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="overlay-bg" id="overlayBg" aria-hidden="true"></div>
    <div class="grid" id="grid"></div>
    <div class="clock" id="clockWrap"><div id="clock">--:--:--</div><div id="date">--/--/----</div></div>
    <div class="liveTag">● LIVE NOW</div>
  </div>

<script src="config.js"></script>
<script>
/*
 Final dashboard script (uses window.CONFIG and window.PARSERS)
 Designed for FullHD (1920x1080) pixel-perfect overlay-retouched.png
*/
const grid = document.getElementById('grid');
function buildTiles(){
  CONFIG.tiles.forEach(t=>{
    const tile = document.createElement('div'); tile.className='tile'; tile.id='tile-'+t.code;
    tile.innerHTML = `
      <div class="tile-top"><div class="flag">${t.flag}</div><div class="title">${t.title}</div><div class="time">${t.time}</div></div>
      <div class="tile-body" id="body-${t.code}">
        <div class="tile-overlay"><div class="mainnum" data-main>--</div></div>
        <div class="subnum" data-sub>--</div>
      </div>
      <div class="tile-bottom"><div class="leftButtons"><button class="btn">บ</button><button class="btn">ล</button></div></div>`;
    grid.appendChild(tile);
  });
}

function updateClock(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('th-TH');document.getElementById('date').textContent=d.toLocaleDateString('th-TH');}
setInterval(updateClock,1000);updateClock();

// snapshots
async function refreshSnapshots(){
  CONFIG.tiles.forEach(t=>{
    const key = encodeURIComponent(t.snapshotKey);
    const url = `${CONFIG.snapshotBase}?key=${key}&_=${Date.now()}`;
    const body = document.getElementById('body-'+t.code);
    // use the snapshot as background full-cover of tile
    body.style.backgroundImage = `url(${url})`;
    body.classList.remove('loading');
  });
}

// fetch numeric APIs and parse results
async function refreshApis(){
  const promises = CONFIG.tiles.map(async t=>{
    try{
      const url = `${CONFIG.apiBase}?key=${encodeURIComponent(t.apiKey)}&_=${Date.now()}`;
      const res = await fetch(url);
      if(!res.ok) throw new Error(res.status);
      const j = await res.json();
      const parsed = window.PARSERS && PARSERS[t.code] ? PARSERS[t.code](j) : genericParser(j);
      return {code:t.code, parsed};
    }catch(e){ console.warn('api fetch fail', t.code, e); return {code:t.code, parsed:null}; }
  });
  const results = await Promise.all(promises);
  results.forEach(r=>{
    const mainEl = document.querySelector('#tile-'+r.code+' [data-main]');
    const subEl = document.querySelector('#tile-'+r.code+' [data-sub]');
    if(r.parsed){ mainEl.textContent = r.parsed.main; subEl.textContent = r.parsed.sub || '--'; }
    else{ mainEl.textContent='--'; subEl.textContent='--'; }
    const box = document.getElementById('body-'+r.code);
    const digits = String(mainEl.textContent).replace(/[^0-9]/g,'').length;
    if(digits>=4){ box.classList.add('outline-red'); box.classList.remove('outline-blue'); } else { box.classList.add('outline-blue'); box.classList.remove('outline-red'); }
  });
}

function genericParser(j){
  const s = JSON.stringify(j);
  const m = s.match(/\d{1,3}(?:,\d{3})*(?:\.\d+)?/g);
  if(!m) return {main:'--', sub:'--'};
  const longest = m.reduce((a,b)=>a.length>b.length?a:b,m[0]);
  return {main:longest, sub:'--'};
}

// initial build & schedule
buildTiles();
refreshSnapshots(); setInterval(refreshSnapshots, CONFIG.snapshotIntervalMs);
refreshApis(); setInterval(refreshApis, CONFIG.apiIntervalMs);

// expose small helper to force-refresh from console
window.LIVE_DASHBOARD = { refreshSnapshots, refreshApis };
</script>
</body>
</html>
